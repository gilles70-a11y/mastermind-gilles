name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK Finale
        run: |
          # Configurazione ambiente
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Creazione manuale del file di progetto usando i file locali
          # Abbiamo verificato che MasterGilles.png esiste nel tuo repo
          echo '{
            "packageId": "com.mastermind.gilles",
            "host": "gilles70-a11y.github.io",
            "name": "Mastermind",
            "launcherName": "Mastermind",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/mastermind-pwa/",
            "iconUrl": "file://'$(pwd)'/MasterGilles.png",
            "maskableIconUrl": "file://'$(pwd)'/MasterGilles.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://gilles70-a11y.github.io/mastermind-pwa/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": false, "playBilling": false },
            "alphaCode": 1,
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "enableNotification": true,
            "orientation": "any",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "generatorApp": "bubblewrap-cli",
            "signingMode": "none"
          }' > twa-manifest.json
          
          # Rispondiamo "no" alla rigenerazione per mantenere il nostro file manuale
          # E usiamo "yes" per accettare le licenze Android
          echo "n" | bubblewrap build --skipSigning || yes | bubblewrap build --skipSigning

      - name: Scarica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: ./*.apk
          
