name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Build APK Senza Errori
        run: |
          # 1. Configurazione ambiente
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Creazione manuale del file di progetto (evitiamo init e update)
          # Usiamo dati pre-compilati per non far fermare il processo
          echo '{
            "packageId": "com.mastermind.gilles",
            "host": "gilles70-a11y.github.io",
            "name": "Mastermind",
            "launcherName": "Mastermind",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/mastermind-pwa/",
            "iconUrl": "https://pwa-builder-dynamic-image.azurewebsites.net/?img=https://gilles70-a11y.github.io/mastermind-pwa/MasterGilles.png&w=512",
            "maskableIconUrl": "https://pwa-builder-dynamic-image.azurewebsites.net/?img=https://gilles70-a11y.github.io/mastermind-pwa/MasterGilles.png&w=512",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://gilles70-a11y.github.io/mastermind-pwa/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": false, "playBilling": false },
            "alphaCode": 1,
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "enableNotification": true,
            "orientation": "any",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "generatorApp": "bubblewrap-cli",
            "signingMode": "none"
          }' > twa-manifest.json

          # 3. Forziamo la creazione del progetto senza domande
          # Usiamo 'yes' per rispondere a ogni richiesta di versione o nomi
          yes "y" | bubblewrap update || true

          # 4. Build finale forzata
          # Se fallisce per le icone, lui proverà comunque a generare l'APK
          yes "n" | bubblewrap build --skipSigning || true

            - name: Carica APK Finale
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          # Questa riga cercherà in TUTTE le cartelle create
          path: "**/*.apk"
          # Se trova più file, non si ferma
          if-no-files-found: error
          
