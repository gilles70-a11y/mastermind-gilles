name: Build Android APK
on:
  push:
    branches: [ main ] # Si attiva quando fai il push su main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Build APK (Automatico)
        run: |
          # Accetta licenze e installa dipendenze (JDK/SDK) in automatico
          echo "y" | bubblewrap doctor --confirm
          
          # Inizializza il progetto. 
          # IMPORTANTE: Sostituisci l'URL qui sotto con quello del tuo sito/manifest!
          yes | bubblewrap init --manifest=https://TUO-SITO-QUI.com/manifest.json --yes
          
          # Genera l'APK saltando la firma digitale per i test
          bubblewrap build --skipSigning

      - name: Carica l'APK come Artefatto
        uses: actions/upload-artifact@v4
        with:
          name: pacchetto-apk-pwa
          path: ./*.apk
          
