name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build APK Rapido
        run: |
          npm install -g @bubblewrap/cli
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Usiamo l'inizializzazione forzata sul file locale che abbiamo visto nello screenshot
          yes | bubblewrap init --localManifest=./manifest.json --yes
          
          # Costruiamo l'APK
          bubblewrap build --skipSigning

      - name: Scarica APK qui
        uses: actions/upload-artifact@v4
        with:
          name: app-mastermind-debug
          path: ./*.apk
