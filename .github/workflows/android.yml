name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Android App (PWA)
        uses: pwa-builder/pwa-starter-action@v1
        with:
          # Legge il file direttamente dal tuo codice, zero download esterni
          manifest-url: https://gilles70-a11y.github.io/mastermind-pwa/manifest.json
          
      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android-fatta
          path: ./**/*.apk
