name: Build Android APK Finale
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java e Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Inizializzazione Diretta da URL
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Inizializziamo puntando direttamente al tuo manifest online
          # Questo evita discrepanze tra il file locale e quello remoto
          yes | bubblewrap init --manifest https://gilles70-a11y.github.io/mastermind-pwa/manifest.json --skipConfig

      - name: Compilazione Dinamica
        run: |
          # Cerchiamo lo script gradlew nella cartella generata
          GRADLE_BIN=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLE_BIN" ]; then
            echo "ERRORE: Bubblewrap non ha creato il progetto."
            exit 1
          fi
          chmod +x "$GRADLE_BIN"
          cd $(dirname "$GRADLE_BIN")
          ./gradlew assembleDebug

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: "**/*.apk"
          if-no-files-found: error
          
