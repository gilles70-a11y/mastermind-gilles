name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generazione e Build Progetto
        run: |
          # 1. Configurazione ambiente
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Inizializzazione FORZATA locale
          # Usiamo "init" puntando al manifest locale nel repo per generare i file Gradle
          # Rispondiamo "yes" a tutto per non bloccare il terminale
          yes | bubblewrap init --manifest=./manifest.json --yes

          # 3. Correzione icone (sovrascriviamo se l'init ha messo URL esterni che falliscono)
          # Usiamo il file locale che abbiamo visto nel tuo repo
          sed -i 's|"iconUrl": ".*"|"iconUrl": "file://'$(pwd)'/MasterGilles.png"|g' twa-manifest.json
          
          # 4. Build finale
          # Ora che gradlew esiste (grazie a init), possiamo compilare
          bubblewrap build --skipSigning

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: ./*.apk
          
