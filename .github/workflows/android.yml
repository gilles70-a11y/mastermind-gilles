name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generazione e Build Progetto
        run: |
          # 1. Configurazione ambiente
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Otteniamo il percorso assoluto della cartella corrente
          CURRENT_DIR=$(pwd)
          
          # 3. Inizializzazione usando il file manifest locale con percorso ASSOLUTO
          # Questo evita l'errore "Invalid URL" visto poco fa
          yes | bubblewrap init --manifest="file://$CURRENT_DIR/manifest.json" --yes

          # 4. Forziamo l'icona locale nel file di configurazione generato
          # Usiamo l'icona che abbiamo visto presente nel tuo repository
          sed -i "s|\"iconUrl\": \".*\"|\"iconUrl\": \"file://$CURRENT_DIR/MasterGilles.png\"|g" twa-manifest.json
          
          # 5. Build finale
          bubblewrap build --skipSigning

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: ./*.apk
          
