name: Build Android APK Finale
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java e Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurazione e Generazione Progetto
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Creiamo il manifest con icone placeholder per evitare il 404 visto prima
          echo '{
            "packageId": "com.mastermind.gilles",
            "host": "gilles70-a11y.github.io",
            "name": "Mastermind",
            "launcherName": "Mastermind",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/mastermind-pwa/",
            "iconUrl": "https://via.placeholder.com/512.png",
            "maskableIconUrl": "https://via.placeholder.com/512.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://gilles70-a11y.github.io/mastermind-pwa/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": false, "playBilling": false },
            "alphaCode": 1,
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "enableNotification": true,
            "orientation": "any",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "generatorApp": "bubblewrap-cli",
            "signingMode": "none"
          }' > twa-manifest.json

          # Usiamo 'yes' per evitare il timeout (Exit code 130) e 'update' per generare i file Gradle
          yes | bubblewrap update

      - name: Compilazione Forzata con Gradle
        run: |
          # Ci assicuriamo che il wrapper Gradle sia eseguibile
          chmod +x gradlew || true
          # Lanciamo la build specifica per generare l'APK di debug
          ./gradlew assembleDebug

      - name: Carica APK (Vero Download)
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          # Puntiamo al percorso specifico dove Android salva i file compilati
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          
