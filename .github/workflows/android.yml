name: Build Android APK Finale
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: PWABuilder Android
        # Questa è l'unica azione che non fallisce mai perché non dipende dall'SDK locale
        uses: pwa-builder/pwa-publish@v3.2.1
        with:
          # Il tuo sito live da cui pescare tutto automaticamente
          manifest_url: https://gilles70-a11y.github.io/mastermind-pwa/manifest.json
          # Configurazione Android forzata
          android: true
          # Saltiamo la firma per avere l'APK immediato
          signing_mode: none

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: ./*.apk
