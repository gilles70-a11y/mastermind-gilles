name: Build Android APK Finale
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java e Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generazione Progetto
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Corretti gli URL: Bubblewrap vuole URL assoluti validi
          echo '{
            "packageId": "com.mastermind.gilles",
            "host": "gilles70-a11y.github.io",
            "name": "Mastermind",
            "launcherName": "Mastermind",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "https://gilles70-a11y.github.io/mastermind-pwa/",
            "iconUrl": "https://via.placeholder.com/512.png",
            "maskableIconUrl": "https://via.placeholder.com/512.png",
            "webManifestUrl": "https://gilles70-a11y.github.io/mastermind-pwa/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": false, "playBilling": false },
            "alphaCode": 1,
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "enableNotification": true,
            "orientation": "any",
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "generatorApp": "bubblewrap-cli",
            "signingMode": "none"
          }' > twa-manifest.json

          # Usiamo init ma specifichiamo di non fare domande
          yes | bubblewrap init --manifest twa-manifest.json --skipConfig

      - name: Compilazione Forzata
        run: |
          # Cerchiamo gradlew ovunque e forziamo la build
          GRADLE_BIN=$(find . -name gradlew | head -n 1)
          if [ -z "$GRADLE_BIN" ]; then
            echo "Errore: Progetto non generato."
            exit 1
          fi
          chmod +x "$GRADLE_BIN"
          cd $(dirname "$GRADLE_BIN")
          ./gradlew assembleDebug

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: "**/*.apk"
          if-no-files-found: error
          
