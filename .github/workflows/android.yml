name: Build Android APK Definitivo
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Forza Generazione Progetto
        run: |
          # 1. Configurazione silenziata per evitare l'errore "SDK isn't correct"
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Creiamo il manifest con dati sicuri (senza scaricare icone esterne che danno 404)
          echo '{"packageId":"com.mastermind.gilles","host":"gilles70-a11y.github.io","name":"Mastermind","launcherName":"Mastermind","display":"standalone","themeColor":"#000000","navigationColor":"#000000","backgroundColor":"#000000","startUrl":"/mastermind-pwa/","iconUrl":"https://via.placeholder.com/512","maskableIconUrl":"https://via.placeholder.com/512","splashScreenFadeOutDuration":300,"shortcuts":[],"webManifestUrl":"https://gilles70-a11y.github.io/mastermind-pwa/manifest.json","fallbackType":"customtabs","features":{"locationDelegation":false,"playBilling":false},"alphaCode":1,"minSdkVersion":19,"targetSdkVersion":34,"enableNotification":true,"orientation":"any","fingerprints":[],"additionalTrustedOrigins":[],"retainedBundles":[],"appVersionName":"1.0.0","appVersionCode":1,"signingKey":{"path":"./android.keystore","alias":"android"},"generatorApp":"bubblewrap-cli","signingMode":"none"}' > twa-manifest.json

          # 3. 'yes' risponde a tutte le domande per evitare il timeout (Exit code 130)
          yes | bubblewrap update

      - name: Build APK con Gradle (Il metodo infallibile)
        run: |
          # Invece di usare Bubblewrap build, usiamo Gradle direttamente
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          # Cerchiamo l'APK ovunque sia stato creato
          path: "app/build/outputs/apk/debug/*.apk"
          
