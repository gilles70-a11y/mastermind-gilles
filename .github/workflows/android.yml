name: Build Android APK Finale
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java e Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generazione Progetto
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          echo '{
            "packageId": "com.mastermind.gilles",
            "host": "gilles70-a11y.github.io",
            "name": "Mastermind",
            "launcherName": "Mastermind",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/mastermind-pwa/",
            "iconUrl": "https://via.placeholder.com/512.png",
            "maskableIconUrl": "https://via.placeholder.com/512.png",
            "webManifestUrl": "https://gilles70-a11y.github.io/mastermind-pwa/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": false, "playBilling": false },
            "alphaCode": 1,
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "enableNotification": true,
            "orientation": "any",
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "generatorApp": "bubblewrap-cli",
            "signingMode": "none"
          }' > twa-manifest.json

          yes | bubblewrap init --manifest twa-manifest.json || true

      - name: Compilazione e Spostamento APK
        run: |
          # Rendiamo eseguibile il wrapper
          chmod +x gradlew || true
          
          # Lanciamo la build
          ./gradlew assembleDebug || true
          
          # CREIAMO IL NOSTRO PATH PERSONALIZZATO
          mkdir -p output_finale
          
          # Cerchiamo l'APK ovunque sia stato creato e lo copiamo a forza nella nostra cartella
          find . -name "*.apk" -exec cp {} ./output_finale/Mastermind.apk \;

      - name: Carica APK (Dal Path Certo)
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          # Ora il path è quello che abbiamo deciso noi sopra
          path: output_finale/Mastermind.apk
          if-no-files-found: error
          
