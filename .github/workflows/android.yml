name: Build Android APK Definitivo
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java e Android SDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurazione Silenziata
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Creiamo il manifest con link sicuri per evitare errori di protocollo
          echo '{
            "packageId": "com.mastermind.gilles",
            "host": "gilles70-a11y.github.io",
            "name": "Mastermind",
            "launcherName": "Mastermind",
            "display": "standalone",
            "themeColor": "#000000",
            "navigationColor": "#000000",
            "backgroundColor": "#000000",
            "startUrl": "/mastermind-pwa/",
            "iconUrl": "https://gilles70-a11y.github.io/mastermind-pwa/MasterGilles.png",
            "maskableIconUrl": "https://gilles70-a11y.github.io/mastermind-pwa/MasterGilles.png",
            "splashScreenFadeOutDuration": 300,
            "shortcuts": [],
            "webManifestUrl": "https://gilles70-a11y.github.io/mastermind-pwa/manifest.json",
            "fallbackType": "customtabs",
            "features": { "locationDelegation": false, "playBilling": false },
            "alphaCode": 1,
            "minSdkVersion": 19,
            "targetSdkVersion": 34,
            "enableNotification": true,
            "orientation": "any",
            "fingerprints": [],
            "additionalTrustedOrigins": [],
            "retainedBundles": [],
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "signingKey": { "path": "./android.keystore", "alias": "android" },
            "generatorApp": "bubblewrap-cli",
            "signingMode": "none"
          }' > twa-manifest.json

          # Usiamo 'yes' per rispondere a ogni singola domanda ed evitare il timeout 130
          yes | bubblewrap update

      - name: Compilazione Brutale (Gradle Direct)
        run: |
          # Se Bubblewrap ha fallito a creare il wrapper, lo forziamo noi
          chmod +x gradlew || true
          ./gradlew assembleDebug --stacktrace

      - name: Carica APK (Vittoria)
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          # Cerchiamo l'APK ovunque, senza percorsi fissi che falliscono
          path: "**/*.apk"
          if-no-files-found: error
          
