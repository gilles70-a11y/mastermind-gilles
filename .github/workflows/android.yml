name: Build APK con PWABuilder
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: PWA-to-Android
        id: pwa_details
        # Questa action automatizza quello che Bubblewrap cercava di fare manualmente
        uses: pwa-builder/pwa-publish@v3
        with:
          manifest-url: https://gilles70-a11y.github.io/mastermind-pwa/manifest.json

      - name: Build APK con Gradle
        run: |
          # PWABuilder scarica i file in una cartella specifica
          cd ${{ steps.pwa_details.outputs.android-folder }}
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Carica l'APK Risultante
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-Vittoria
          path: "**/*.apk"
          
