name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurazione e Build APK
        run: |
          # Creiamo la cartella di configurazione per evitare domande interattive
          mkdir -p ~/.bubblewrap
          
          # Diciamo a Bubblewrap dove trovare Java e Android SDK già installati
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Inizializziamo il progetto con il tuo URL reale
          # Nota: 'yes' risponde automaticamente a eventuali conferme residue
          yes | bubblewrap init --manifest=https://gilles70-a11y.github.io/mastermind-pwa/manifest.json --yes
          
          # Costruiamo l'APK finale saltando la firma (per uso test/personale)
          bubblewrap build --skipSigning

      - name: Carica l'APK come Artefatto
        uses: actions/upload-artifact@v4
        with:
          name: pacchetto-apk-mastermind
          path: ./*.apk
