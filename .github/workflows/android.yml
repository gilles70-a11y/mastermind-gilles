name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Generazione APK Forzata
        run: |
          # 1. Configurazione ambiente
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # 2. Inizializzazione usando un'icona sicuramente esistente online
          # Usiamo l'URL del tuo manifest su GitHub Pages che ora dovrebbe essere attivo
          yes | bubblewrap init --manifest="https://gilles70-a11y.github.io/mastermind-pwa/manifest.json" --yes

          # 3. Build finale (Ignoriamo gli errori dei controlli e compiliamo)
          bubblewrap build --skipSigning

      - name: Carica APK
        uses: actions/upload-artifact@v4
        with:
          name: Mastermind-APK
          path: ./*.apk
          
