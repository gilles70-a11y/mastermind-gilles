name: Build Android APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configurazione e Build APK
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\":\"$JAVA_HOME\",\"androidSdkPath\":\"$ANDROID_HOME\"}" > ~/.bubblewrap/config.json
          
          # Invece di usare l'URL, puntiamo direttamente al file nel tuo repository
          # Se il tuo manifest si chiama in modo diverso (es. manifest.webmanifest), cambialo qui sotto
          yes | bubblewrap init --manifest=./manifest.json --yes
          
          bubblewrap build --skipSigning

      - name: Carica l'APK come Artefatto
        uses: actions/upload-artifact@v4
        with:
          name: pacchetto-apk-mastermind
          path: ./*.apk
