<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastermind Gilles</title>
    <link rel="icon" type="image/png" href="MasterGilles.png">
    <link rel="apple-touch-icon" href="MasterGilles.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { 
            --bg: #1a1a2e; 
            --panel: #16213e; 
            --accent: #4cc9f0; 
            --win: #4caf50;
            --loss: #f44336;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            color: white; 
            text-align: center; 
            margin: 0; padding: 10px; 
            display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
            overflow: hidden;
        }

        h1 { font-size: 1.4rem; color: var(--accent); margin: 5px 0; letter-spacing: 2px; text-transform: uppercase; }
        .stats { font-size: 0.85rem; margin-bottom: 10px; color: #a2a2c2; line-height: 1.4; }

        #game-board { 
            flex-grow: 1; max-width: 450px; margin: auto; 
            background: var(--panel); padding: 10px; border-radius: 15px; 
            overflow-y: auto; width: 100%; box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        .row { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 6px; padding: 8px; background: rgba(255,255,255,0.03); 
            border-radius: 10px; animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .slots-container { display: flex; gap: 6px; }
        .slot { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #333; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); }
        
        .feedback-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; background: rgba(0,0,0,0.2); padding: 4px; border-radius: 5px; }
        .pin { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #000; }

        .controls { background: var(--bg); padding: 15px 5px; width: 100%; max-width: 450px; margin: 0 auto; }
        .current-selection { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 12px; min-height: 40px; }
        .color-picker { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .choice { width: 42px; height: 42px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: transform 0.1s; }
        .choice:active { transform: scale(0.85); }
        
        .btn-group { display: flex; gap: 10px; }
        button { padding: 14px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; }
        .btn-check { background: var(--win); color: white; flex: 2; }
        .btn-del { background: var(--loss); color: white; flex: 1; }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center;
        }
        .modal {
            background: var(--panel); padding: 30px; border-radius: 20px; border: 3px solid var(--accent);
            max-width: 85%; text-align: center; box-shadow: 0 0 30px var(--accent);
        }
        .modal h2 { font-size: 2.2rem; margin: 0; text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        .modal p { font-size: 1.1rem; margin: 15px 0 5px; color: #ccc; }
        .secret-reveal { display: flex; gap: 10px; justify-content: center; margin: 15px 0 25px; }
        .btn-restart { background: var(--accent); color: var(--bg); width: 100%; font-size: 1.1rem; }
        #best-score { font-size: 0.8rem; color: var(--accent); margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <h1>Mastermind Gilles</h1>
    <div class="stats" id="win-counter">Caricamento statistiche...</div>
    <div id="game-board"></div>

    <div class="controls">
        <div class="current-selection" id="current-view"></div>
        <div class="color-picker" id="picker"></div>
        <div class="btn-group">
            <button class="btn-del" onclick="deleteLast()">⌫</button>
            <button class="btn-check" onclick="checkAttempt()">Verifica</button>
        </div>
    </div>

    <div id="overlay">
        <div class="modal">
            <h2 id="result-text"></h2>
            <p id="attempt-info"></p>
            <p>La sequenza era:</p>
            <div class="secret-reveal" id="secret-reveal"></div>
            <button class="btn-restart" onclick="resetGame()">Nuova Sfida</button>
            <span id="best-score"></span>
        </div>
    </div>

<script>
    const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#e67e22', '#9b59b6'];
    let secretCode = [];
    let currentAttempt = [];
    let stats = JSON.parse(localStorage.getItem('mm_stats')) || { wins: 0, losses: 0, best: null };
    let audioCtx;

    function playSound(freq, type, duration) {
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        } catch (e) {}
    }

    function initGame() {
        secretCode = Array.from({ length: 4 }, () => COLORS[Math.floor(Math.random() * COLORS.length)]);
        updateStatsUI();
        setupPicker();
        renderSelection();
    }

    function setupPicker() {
        const picker = document.getElementById('picker');
        picker.innerHTML = '';
        COLORS.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'choice';
            btn.style.backgroundColor = color;
            btn.onclick = () => {
                if(currentAttempt.length < 4) {
                    currentAttempt.push(color);
                    renderSelection();
                    playSound(400, 'sine', 0.1);
                }
            };
            picker.appendChild(btn);
        });
    }

    function renderSelection() {
        const view = document.getElementById('current-view');
        view.innerHTML = '';
        for(let i=0; i<4; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if(currentAttempt[i]) {
                slot.style.backgroundColor = currentAttempt[i];
                slot.style.border = "2px solid white";
            }
            view.appendChild(slot);
        }
    }

    function deleteLast() {
        if(currentAttempt.length > 0) { currentAttempt.pop(); renderSelection(); playSound(200, 'sine', 0.1); }
    }

    function checkAttempt() {
        if (currentAttempt.length < 4) return;
        let black = 0, white = 0;
        let sCopy = [...secretCode], aCopy = [...currentAttempt];
        for(let i=0; i<4; i++) { if(aCopy[i] === sCopy[i]) { black++; sCopy[i] = aCopy[i] = null; } }
        for(let i=0; i<4; i++) { if(aCopy[i]) { let index = sCopy.indexOf(aCopy[i]); if(index !== -1) { white++; sCopy[index] = null; } } }
        
        addBoardRow(currentAttempt, black, white);
        const attemptsUsed = document.querySelectorAll('.row').length;

        if (black === 4) {
            endGame(true, attemptsUsed);
        } else if (attemptsUsed >= 10) {
            endGame(false, attemptsUsed);
        }
        currentAttempt = [];
        renderSelection();
    }

    function endGame(win, attempts) {
        const overlay = document.getElementById('overlay');
        const resText = document.getElementById('result-text');
        const attInfo = document.getElementById('attempt-info');
        const reveal = document.getElementById('secret-reveal');
        const bestSpan = document.getElementById('best-score');
        
        reveal.innerHTML = secretCode.map(c => `<div class="slot" style="background:${c}"></div>`).join('');
        
        if(win) {
            resText.innerText = "HAI VINTO!";
            resText.style.color = "var(--win)";
            attInfo.innerText = `Codice decifrato in ${attempts} tentativi!`;
            stats.wins++;
            if(!stats.best || attempts < stats.best) stats.best = attempts;
            playSound(800, 'square', 0.4);
        } else {
            resText.innerText = "HAI PERSO!";
            resText.style.color = "var(--loss)";
            attInfo.innerText = "Hai esaurito i 10 tentativi.";
            stats.losses++;
            playSound(150, 'sawtooth', 0.6);
        }
        
        bestSpan.innerText = stats.best ? `Record Personale: ${stats.best} tentativi` : "";
        saveStats();
        overlay.style.display = 'flex';
    }

    function addBoardRow(attempt, black, white) {
        const board = document.getElementById('game-board');
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<div class="slots-container">` + 
            attempt.map(c => `<div class="slot" style="background:${c}"></div>`).join('') + 
            `</div><div class="feedback-grid">` +
            Array(black).fill('<div class="pin" style="background:black"></div>').join('') +
            Array(white).fill('<div class="pin" style="background:white"></div>').join('') +
            `</div>`;
        board.prepend(row);
    }

    function saveStats() {
        localStorage.setItem('mm_stats', JSON.stringify(stats));
        updateStatsUI();
    }

    function updateStatsUI() {
        let text = `Vittorie: ${stats.wins} | Sconfitte: ${stats.losses}`;
        if(stats.best) text += `<br>Miglior Punteggio: ${stats.best} tentativi`;
        document.getElementById('win-counter').innerHTML = text;
    }

    function resetGame() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('game-board').innerHTML = '';
        currentAttempt = [];
        secretCode = Array.from({ length: 4 }, () => COLORS[Math.floor(Math.random() * COLORS.length)]);
        renderSelection();
    }

    window.onload = initGame;
</script>
</body>
</html>
