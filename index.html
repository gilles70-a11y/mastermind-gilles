<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mastermind Gilles</title>

    <link rel="icon" type="image/png" href="MasterGilles.png">
    <link rel="apple-touch-icon" href="MasterGilles.png">
    <link rel="manifest" href="manifest.json">
    
    <style>
        :root { 
            --bg: #1a1a2e; 
            --panel: #16213e; 
            --accent: #4cc9f0; 
            --win: #4caf50;
            --loss: #f44336;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: white; 
            text-align: center; 
            margin: 0; 
            padding: 10px; 
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        h1 { font-size: 1.4rem; color: var(--accent); margin: 5px 0; letter-spacing: 2px; text-transform: uppercase; }
        
        .stats { font-size: 0.85rem; margin-bottom: 10px; color: #a2a2c2; }

        #game-board { 
            flex-grow: 1;
            max-width: 450px; 
            margin: auto; 
            background: var(--panel); 
            padding: 10px; 
            border-radius: 15px; 
            overflow-y: auto;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
        }

        .row { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            margin-bottom: 6px; 
            padding: 8px; 
            background: rgba(255,255,255,0.03); 
            border-radius: 10px; 
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .slots-container { display: flex; gap: 6px; }
        .slot { 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border: 2px solid #333; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }
        
        .feedback-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 3px; 
            background: rgba(0,0,0,0.2); 
            padding: 4px; 
            border-radius: 5px; 
        }
        .pin { width: 10px; height: 10px; border-radius: 50%; border: 1px solid #000; }

        .controls { 
            background: var(--bg); 
            padding: 15px 5px; 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto;
        }

        .current-selection { 
            display: flex; 
            justify-content: center; 
            gap: 12px; 
            margin-bottom: 15px; 
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            min-height: 35px;
        }

        .color-picker { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            flex-wrap: wrap; 
            margin-bottom: 15px; 
        }

        .choice { 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            cursor: pointer; 
            border: 2px solid rgba(255,255,255,0.2);
            transition: transform 0.1s; 
        }
        .choice:active { transform: scale(0.85); }
        
        .btn-group { display: flex; gap: 10px; }
        button { 
            padding: 14px; 
            font-weight: bold; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            text-transform: uppercase;
            font-size: 0.9rem;
        }
        .btn-check { background: var(--win); color: white; flex: 2; }
        .btn-del { background: var(--loss); color: white; flex: 1; }
        .btn-save { 
            background: #444; 
            color: #ddd; 
            margin-top: 10px; 
            width: 100%; 
            font-size: 0.75rem; 
            padding: 8px;
        }

        #game-board::-webkit-scrollbar { width: 5px; }
        #game-board::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <h1>Mastermind Gilles</h1>
    <div class="stats" id="win-counter">Caricamento...</div>
    
    <div id="game-board"></div>

    <div class="controls">
        <div class="current-selection" id="current-view"></div>
        <div class="color-picker" id="picker"></div>
        <div class="btn-group">
            <button class="btn-del" onclick="deleteLast()">⌫ Cancella</button>
            <button class="btn-check" onclick="checkAttempt()">Verifica</button>
        </div>
        <button class="btn-save" onclick="exportStats()">💾 Esporta Statistiche</button>
    </div>

<script>
    const COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#e67e22', '#9b59b6'];
    let secretCode = [];
    let currentAttempt = [];
    let stats = JSON.parse(localStorage.getItem('mm_stats')) || { wins: 0, losses: 0 };

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    function initGame() {
        secretCode = Array.from({ length: 4 }, () => COLORS[Math.floor(Math.random() * COLORS.length)]);
        updateStatsUI();
        setupPicker();
        renderSelection();
    }

    function setupPicker() {
        const picker = document.getElementById('picker');
        picker.innerHTML = '';
        COLORS.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'choice';
            btn.style.backgroundColor = color;
            btn.onclick = () => {
                if(currentAttempt.length < 4) {
                    currentAttempt.push(color);
                    renderSelection();
                    playSound(400, 'sine', 0.1);
                }
            };
            picker.appendChild(btn);
        });
    }

    function renderSelection() {
        const view = document.getElementById('current-view');
        view.innerHTML = '';
        for(let i=0; i<4; i++) {
            const slot = document.createElement('div');
            slot.className = 'slot';
            if(currentAttempt[i]) {
                slot.style.backgroundColor = currentAttempt[i];
                slot.style.border = "2px solid white";
            }
            view.appendChild(slot);
        }
    }

    function deleteLast() {
        if(currentAttempt.length > 0) {
            currentAttempt.pop();
            renderSelection();
            playSound(200, 'sine', 0.1);
        }
    }

    function checkAttempt() {
        if (currentAttempt.length < 4) return;

        let black = 0, white = 0;
        let sCopy = [...secretCode], aCopy = [...currentAttempt];

        for(let i=0; i<4; i++) {
            if(aCopy[i] === sCopy[i]) { black++; sCopy[i] = aCopy[i] = null; }
        }
        for(let i=0; i<4; i++) {
            if(aCopy[i]) {
                let index = sCopy.indexOf(aCopy[i]);
                if(index !== -1) { white++; sCopy[index] = null; }
            }
        }

        addBoardRow(currentAttempt, black, white);
        
        if (black === 4) {
            playSound(800, 'square', 0.3);
            setTimeout(() => { alert("🎉 Grande Gilles! Hai vinto!"); resetGame(); }, 100);
            stats.wins++;
        } else if (document.querySelectorAll('.row').length >= 10) {
            playSound(150, 'sawtooth', 0.5);
            alert("Ritenta! Il codice era nascosto bene.");
            stats.losses++;
            resetGame();
        }
        
        currentAttempt = [];
        renderSelection();
        saveStats();
    }

    function addBoardRow(attempt, black, white) {
        const board = document.getElementById('game-board');
        const row = document.createElement('div');
        row.className = 'row';
        row.innerHTML = `<div class="slots-container">` + 
            attempt.map(c => `<div class="slot" style="background:${c}"></div>`).join('') + 
            `</div><div class="feedback-grid">` +
            Array(black).fill('<div class="pin" style="background:black"></div>').join('') +
            Array(white).fill('<div class="pin" style="background:white"></div>').join('') +
            `</div>`;
        board.prepend(row);
    }

    function saveStats() {
        localStorage.setItem('mm_stats', JSON.stringify(stats));
        updateStatsUI();
    }

    function updateStatsUI() {
        document.getElementById('win-counter').innerText = `Vittorie: ${stats.wins} | Sconfitte: ${stats.losses}`;
    }

        const blob = new Blob([JSON.stringify(stats, null, 2)], {
